<div class="accordion-item mb-3">
    <h2 class="accordion-header" id="{{ group_id }}-heading">
        <button class="accordion-button rounded-top" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#{{ group_id }}-body"
                aria-expanded="true"
                aria-controls="{{ group_id }}-body">
            {% if group.icon %}<i class="{{ group.icon }} me-2 text-muted"></i>{% endif %}
            {{ _(group.label) }}
            <span class="badge bg-secondary ms-2 fw-normal">{{ group_rows|length }}</span>
        </button>
    </h2>
    <div id="{{ group_id }}-body"
            class="accordion-collapse collapse show"
            aria-labelledby="{{ group_id }}-heading">
        <div class="accordion-body p-0">
            <table class="table table-hover align-middle mb-0 table-header rounded">
                <thead class="table-light">
                    <tr>
                        <th style="width:2rem"></th>
                        <th>{{ _("Metric") }}</th>
                        <th style="width:6rem">{{ _("Enabled") }}</th>
                        <th style="width:6rem">{{ _("Columns") }}</th>
                        <th style="width:6rem">{{ _("Rows") }}</th>
                        <th style="width:10rem">{{ _("Access") }}</th>
                        <th style="width:8rem">{{ _("Cache TTL") }}</th>
                        <th style="width:7rem"></th>
                    </tr>
                </thead>
                <tbody data-group-tbody="{{ group.name }}" class="border-top-0">
                    {% for row in group_rows %}
                    <tr class="metric-row"
                        data-metric="{{ row.name }}"
                        data-update-url="{{ h.url_for('better_stats_settings.update_metric_config', metric_name=row.name) }}"
                        data-cache-url="{{ h.url_for('better_stats_settings.clear_metric_cache', metric_name=row.name) }}">

                        <td class="sortable-handle text-muted" style="cursor:grab" title="{{ _('Drag to reorder') }}">
                            <i class="fa fa-bars"></i>
                        </td>

                        <td>
                            <i class="{{ row.icon }} me-1 text-muted"></i>
                            <span class="fw-medium">{{ row.title }}</span>
                            <small class="text-muted ms-1">({{ row.name }})</small>
                        </td>

                        <td>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input metric-field"
                                    type="checkbox"
                                    data-field="enabled"
                                    {% if row.enabled %}checked{% endif %}>
                            </div>
                        </td>

                        <td>
                            <select class="form-select form-select-sm metric-field" data-field="col_span">
                                <option value="1" {% if row.col_span == 1 %}selected{% endif %}>1</option>
                                <option value="2" {% if row.col_span == 2 %}selected{% endif %}>2</option>
                                <option value="3" {% if row.col_span == 3 %}selected{% endif %}>3 ({{ _("half") }})</option>
                                <option value="4" {% if row.col_span == 4 %}selected{% endif %}>4</option>
                                <option value="5" {% if row.col_span == 5 %}selected{% endif %}>5</option>
                                <option value="6" {% if row.col_span == 6 %}selected{% endif %}>6 ({{ _("full") }})</option>
                            </select>
                        </td>
                        <td>
                            <select class="form-select form-select-sm metric-field" data-field="row_span">
                                <option value="1" {% if row.row_span == 1 %}selected{% endif %}>1</option>
                                <option value="2" {% if row.row_span == 2 %}selected{% endif %}>2 ({{ _("tall") }})</option>
                            </select>
                        </td>

                        <td>
                            <select class="form-select form-select-sm metric-field" data-field="access_level">
                                <option value="public" {% if row.access_level == 'public' %}selected{% endif %}>{{ _("Public") }}</option>
                                <option value="authenticated" {% if row.access_level == 'authenticated' %}selected{% endif %}>{{ _("Authenticated") }}</option>
                                <option value="admin" {% if row.access_level == 'admin' %}selected{% endif %}>{{ _("Admin") }}</option>
                            </select>
                        </td>

                        <td>
                            <input type="number"
                                class="form-control form-control-sm metric-field"
                                data-field="cache_timeout"
                                value="{{ row.cache_timeout }}"
                                min="0" step="1"
                                style="width:6rem">
                        </td>

                        <td class="text-end">
                            <button type="button" class="btn btn-sm btn-outline-secondary btn-clear-cache"
                                title="{{ _('Clear cache for this metric') }}">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
