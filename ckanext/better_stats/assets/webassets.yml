better_stats-js:
  filter: rjsmin
  output: ckanext-better_stats/%(version)s-better_stats.js
  contents:
    - js/vendor/echarts.min.js
    - js/vendor/echarts-dark.js
    - js/vendor/snapdom.min.js
    - js/bstats.min.js
  extra:
    preload:
      - base/main

better_stats-settings-js:
  filter: rjsmin
  output: ckanext-better_stats/%(version)s-better_stats-settings.js
  contents:
    - js/vendor/Sortable.min.js
    - js/bstats.min.js
  extra:
    preload:
      - base/main

better_stats-css:
  filter: cssrewrite
  output: ckanext-better_stats/%(version)s-better_stats.css
  contents:
    - css/styles.css
